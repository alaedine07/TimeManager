<!-- frontend/src/app/pages/Register/register.component.html -->
<div class="auth-container">
  <h2>Register</h2>

  <form (ngSubmit)="submit()">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" [value]="username()" (input)="username.set($event.target.value)" required />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" [value]="password()" (input)="password.set($event.target.value)" required />
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" [value]="confirmPassword()" (input)="confirmPassword.set($event.target.value)" required />
    </div>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    @if (loading()) {
      <div class="loading">Registering...</div>
    }

    <button type="submit" [disabled]="loading()">Register</button>
  </form>

  <p>
    Already have an account?
    <a routerLink="/login">Login here</a>
  </p>
</div>
