<div class="container">
  <h1>My Projects</h1>

  <button (click)="showCreateForm()">+ New Project</button>

  @if (loading()) {
    <p>Loading projects...</p>
  }

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  <div class="projects-grid">
    @for (project of projects(); track project.id) {
      <div class="project-card">
        <h3>{{ project.name }}</h3>
        <p>{{ project.description }}</p>
        <a [routerLink]="['/projects', project.id]">View Tasks →</a>
      </div>
    }
  </div>
</div>
