<div class="auth-container">
  <h2>Login</h2>

  <form (ngSubmit)="submit()">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" [value]="username()" (input)="username.set($event.target.value)" required />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" [value]="password()" (input)="password.set($event.target.value)" required />
    </div>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    @if (loading()) {
      <div class="loading">Logging in...</div>
    }

    <button type="submit" [disabled]="loading()">Login</button>
  </form>

  <p>
    Don't have an account?
    <a routerLink="/register">Register here</a>
  </p>
</div>
