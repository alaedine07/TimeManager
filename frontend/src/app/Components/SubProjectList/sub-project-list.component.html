<!-- Components/SubProjectList/sub-project-list.component.html -->
<div class="space-y-6">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h2 class="font-headline text-2xl font-bold text-on-surface">Sub-Projects</h2>
    <button
      (click)="toggleSubProjectForm()"
      class="bg-primary text-on-primary px-6 py-3 rounded-xl font-bold text-sm flex items-center gap-2 hover:shadow-lg hover:shadow-primary/20 transition-all"
    >
      <span class="material-symbols-outlined text-lg">
        {{ showSubProjectForm() ? 'close' : 'add' }}
      </span>
      {{ showSubProjectForm() ? 'Cancel' : 'Add Sub Project' }}
    </button>
  </div>

  <!-- Form Section -->
  @if (showSubProjectForm()) {
    <div class="bg-surface-container-lowest rounded-xl p-8 shadow-sm">
      <app-sub-project-form
        mode="add"
        [parentProjectId]="parentProjectId"
        (saved)="addSubProject($event)"
        (cancelled)="toggleSubProjectForm()"
      ></app-sub-project-form>
    </div>
  }

  <!-- Empty State -->
  @if (subProjects.length === 0) {
    <div class="flex flex-col items-center justify-center py-12 text-center">
      <span class="material-symbols-outlined text-6xl text-outline-variant/30 mb-4">folder</span>
      <p class="text-on-surface-variant font-body">No sub-projects yet. Create one to get started.</p>
    </div>
  } @else {
    <!-- SubProjects Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (subProject of subProjects; track subProject.id) {
        <app-sub-project-item
          [subProject]="subProject"
          (updated)="onUpdated($event)"
          (deleted)="deleteSubProject($event)"
        ></app-sub-project-item>
      }
    </div>
  }
</div>
