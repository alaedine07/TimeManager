<!-- Components/TaskForm/task-form.component.html -->
<div class="w-full">
  <form [formGroup]="taskForm" (ngSubmit)="save()" class="space-y-6">
    <!-- Task Name Field -->
    <div class="space-y-2">
      <label for="taskName" class="block font-headline font-bold text-on-surface text-sm">Task Name *</label>
      <input
        id="taskName"
        type="text"
        formControlName="name"
        placeholder="Enter task name"
        class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/30 text-on-surface placeholder:text-outline-variant font-body transition-all"
        autofocus
      />
      @if (taskForm.get('name')?.invalid && taskForm.get('name')?.touched) {
        <span class="block text-error text-xs font-bold mt-1">
          @if (taskForm.get('name')?.errors?.['required']) {
            Task name is required
          } @else if (taskForm.get('name')?.errors?.['minlength']) {
            Task name must be at least 3 characters
          }
        </span>
      }
    </div>

    <!-- Priority and Due Date Row -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Priority Field -->
      <div class="space-y-2">
        <label for="taskPriority" class="block font-headline font-bold text-on-surface text-sm">Priority</label>
        <select
          id="taskPriority"
          formControlName="priority"
          class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/30 text-on-surface font-body transition-all"
        >
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>

      <!-- Due Date Field -->
      <div class="space-y-2">
        <label for="taskDueDate" class="block font-headline font-bold text-on-surface text-sm">Due Date</label>
        <input
          id="taskDueDate"
          type="date"
          formControlName="dueDate"
          class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/30 text-on-surface font-body transition-all"
        />
      </div>
    </div>

    <!-- Description Field -->
    <div class="space-y-2">
      <label for="taskDesc" class="block font-headline font-bold text-on-surface text-sm">Description</label>
      <textarea
        id="taskDesc"
        formControlName="description"
        placeholder="Add task description (optional)"
        rows="3"
        class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/30 text-on-surface placeholder:text-outline-variant font-body transition-all resize-none"
      ></textarea>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-3 justify-end pt-4">
      <button
        type="button"
        class="px-6 py-3 rounded-lg font-bold text-on-surface hover:bg-surface-container-high transition-all"
        (click)="cancelled.emit()"
      >
        Cancel
      </button>
      <button
        type="submit"
        class="px-6 py-3 rounded-lg bg-primary-gradient text-on-primary font-bold shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="taskForm.invalid"
      >
        {{ mode === 'add' ? 'Create Task' : 'Save Changes' }}
      </button>
    </div>
  </form>
</div>
