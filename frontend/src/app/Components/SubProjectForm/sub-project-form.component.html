<!-- Components/SubProjectForm/sub-project-form.component.html -->
<div class="w-full">
  <form [formGroup]="subProjectForm" (ngSubmit)="save()" class="space-y-6">
    <!-- Project Name Field -->
    <div class="space-y-2">
      <label for="projectName" class="block font-headline font-bold text-on-surface text-sm">Project Name *</label>
      <input
        id="projectName"
        type="text"
        formControlName="name"
        placeholder="Enter project name"
        class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/30 text-on-surface placeholder:text-outline-variant font-body transition-all"
        autofocus
      />
      @if (subProjectForm.get('name')?.invalid && subProjectForm.get('name')?.touched) {
        <span class="block text-error text-xs font-bold mt-1">
          @if (subProjectForm.get('name')?.errors?.['required']) {
            Project name is required
          } @else if (subProjectForm.get('name')?.errors?.['minlength']) {
            Project name must be at least 3 characters
          }
        </span>
      }
    </div>

    <!-- Description Field -->
    <div class="space-y-2">
      <label for="projectDesc" class="block font-headline font-bold text-on-surface text-sm">Description</label>
      <textarea
        id="projectDesc"
        formControlName="description"
        placeholder="Add project description (optional)"
        rows="3"
        class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/30 text-on-surface placeholder:text-outline-variant font-body transition-all resize-none"
      ></textarea>
    </div>

    <!-- Default Tab Field -->
    <div class="space-y-2">
      <label for="subProjectType" class="block font-headline font-bold text-on-surface text-sm">Default Tab When Open</label>
      <select
        id="subProjectType"
        class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/30 text-on-surface font-body transition-all"
        formControlName="defaultTabOnOpen"
      >
        <option value="tasks">Tasks</option>
        <option value="subprojects">Sub Projects</option>
      </select>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-3 justify-end pt-4">
      <button
        type="button"
        class="px-6 py-3 rounded-lg font-bold text-on-surface hover:bg-surface-container-high transition-all"
        (click)="cancelled.emit()"
      >
        Cancel
      </button>
      <button
        type="submit"
        class="px-6 py-3 rounded-lg bg-primary-gradient text-on-primary font-bold shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="subProjectForm.invalid"
      >
        {{ mode === 'add' ? 'Create Sub Project' : 'Save Changes' }}
      </button>
    </div>
  </form>
</div>
