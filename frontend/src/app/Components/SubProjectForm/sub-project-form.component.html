<!-- components/sub-project-form/sub-project-form.component.html -->
<div class="task-form-container">
  <form [formGroup]="subProjectForm" (ngSubmit)="save()" class="task-form">
    <div class="form-row">
      <div class="form-group">
        <label for="projectName">Project name *</label>
        <input
          id="projectName"
          type="text"
          formControlName="name"
          placeholder="Enter project name"
          class="form-input"
          autofocus>
        @if (subProjectForm.get('name')?.invalid && subProjectForm.get('name')?.touched) {
          <span class="error-text">
            @if (subProjectForm.get('name')?.errors?.['required']) {
              Project name is required
            } @else if (subProjectForm.get('name')?.errors?.['minlength']) {
              Project name must be at least 3 characters
            }
          </span>
        }
      </div>
    </div>

    <div class="form-group">
      <label for="subProjectType">Default tab when open</label>
      <select
        id="subProjectType"
        class="form-input"
        formControlName="defaultTabOnOpen">
        <option value="tasks">Tasks</option>
        <option value="subprojects">Sub Projects</option>
      </select>
    </div>

    <div class="form-group">
      <label for="projectDesc">Description</label>
      <textarea
        id="projectDesc"
        formControlName="description"
        placeholder="Add project description (optional)"
        rows="3"
        class="form-input"></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="cancelled.emit()">
        Cancel
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="subProjectForm.invalid">
        {{ mode === 'add' ? 'Create Sub Project' : 'Save Changes' }}
      </button>
    </div>
  </form>
</div>
