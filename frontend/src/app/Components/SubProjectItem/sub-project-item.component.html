<!-- components/sub-project-item/sub-project-item.component.html -->
<div class="subproject-card" [class.completed]="subProject.completed" [class.archived]="subProject.archived">
  @if (editing()) {
    <app-sub-project-form
      mode="edit"
      [initialData]="subProject"
      (saved)="saveEditSubProject($event)"
      (cancelled)="cancelEdit()"
    ></app-sub-project-form>
  } @else if (beingDeleted()) {
    <div class="delete-confirmation">
      <div class="confirmation-content">
        <h4>Delete "{{ subProject.name }}"?</h4>
        <p>This action cannot be undone.</p>
      </div>
      <div class="confirmation-actions">
        <button class="btn-confirm" (click)="confirmDelete()">
          Delete
        </button>
        <button class="btn-cancel" (click)="cancelDelete()">
          Cancel
        </button>
      </div>
    </div>
  } @else {
    <div class="subproject-header">
      <div class="subproject-title-section">
        <div class="subproject-info">
          <h3>{{ subProject.name }}</h3>
          @if (subProject.archived) {
            <span class="archived-badge">Archived</span>
          }
        </div>
      </div>
      <button class="btn-actions-menu" (click)="toggleActions()" title="More options">
        ⋮
      </button>
    </div>

    @if (actionsOpen()) {
      <div class="actions-dropdown">
        <button class="action-item complete" (click)="toggleComplete()">
          <span class="icon">{{ subProject.completed ? '↩' : '✓' }}</span>
          {{ subProject.completed ? 'Mark as Incomplete' : 'Mark as Completed' }}
        </button>
        <button class="action-item edit" (click)="startEdit()">
          <span class="icon">✎</span>
          Edit
        </button>
        <button class="action-item archive" (click)="toggleArchive()">
          <span class="icon">{{ subProject.archived ? '↩ Unarchive' : '📦 Archive' }}</span>
        </button>
        <button class="action-item delete" (click)="startDelete()">
          <span class="icon">×</span>
          Delete
        </button>
      </div>
    }

    <p class="subproject-description">{{ subProject.description }}</p>

    <div class="subproject-time-worked">
      <span class="time-label">Total Time Worked:</span>
      <span class="time-value">{{ totalTime() || '0h 0m' }}</span>
    </div>

    <a [routerLink]="['/projects', subProject.id]" class="view-link">View →</a>
  }
</div>
