<!-- Components/NavBar/navbar.component.html -->
<aside *ngIf="isLoggedIn" class="fixed left-0 top-0 h-screen w-20 bg-surface-container-highest border-r border-outline/10 flex flex-col items-center py-6 gap-4 shadow-lg">
  <!-- Navigation Menu -->
  <nav class="flex flex-col gap-4">
    <!-- Dashboard -->
    <button
      (click)="navigateTo('dashboard')"
      title="Dashboard"
      aria-label="Go to Dashboard"
      class="w-12 h-12 rounded-xl flex items-center justify-center text-on-surface hover:bg-surface-container-high transition-all duration-200 group relative"
    >
      <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">dashboard</span>
      <span class="absolute left-20 px-3 py-1.5 bg-surface-variant text-on-surface rounded-lg text-xs font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">Dashboard</span>
    </button>

    <!-- Projects -->
    <button
      (click)="navigateTo('projects')"
      title="Projects"
      aria-label="Go to Projects"
      class="w-12 h-12 rounded-xl flex items-center justify-center text-on-surface hover:bg-surface-container-high transition-all duration-200 group relative"
    >
      <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">folder_open</span>
      <span class="absolute left-20 px-3 py-1.5 bg-surface-variant text-on-surface rounded-lg text-xs font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">Projects</span>
    </button>

    <!-- Todos -->
    <button
      (click)="navigateTo('todos')"
      title="Todo List"
      aria-label="Go to Todo List"
      class="w-12 h-12 rounded-xl flex items-center justify-center text-on-surface hover:bg-surface-container-high transition-all duration-200 group relative"
    >
      <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">checklist</span>
      <span class="absolute left-20 px-3 py-1.5 bg-surface-variant text-on-surface rounded-lg text-xs font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">Todo List</span>
    </button>

    <!-- Profile -->
    <button
      (click)="navigateTo('profile')"
      title="Profile"
      aria-label="Go to Profile"
      class="w-12 h-12 rounded-xl flex items-center justify-center text-on-surface hover:bg-surface-container-high transition-all duration-200 group relative"
    >
      <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">account_circle</span>
      <span class="absolute left-20 px-3 py-1.5 bg-surface-variant text-on-surface rounded-lg text-xs font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">Profile</span>
    </button>
  </nav>

  <!-- Logout Button at Bottom -->
  <div class="mt-auto">
    <button
      (click)="logout()"
      title="Logout"
      aria-label="Logout"
      class="w-12 h-12 rounded-xl flex items-center justify-center text-error hover:bg-error-container transition-all duration-200 group relative"
    >
      <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">logout</span>
      <span class="absolute left-20 px-3 py-1.5 bg-error-container text-error rounded-lg text-xs font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">Logout</span>
    </button>
  </div>
</aside>
