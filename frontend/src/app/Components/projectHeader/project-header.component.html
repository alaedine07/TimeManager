<!--Components/projectHeader/project-header.component.html-->
<div class="space-y-6">
  <!-- Navigation Bar -->
  <div class="flex items-center justify-between">
    <button
      (click)="backClicked.emit()"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-primary hover:bg-primary-container/30 transition-all font-bold"
    >
      <span class="material-symbols-outlined">arrow_back</span>
      Back
    </button>
    <a
      routerLink="/"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-on-surface hover:bg-surface-container-high transition-all font-bold"
    >
      <span class="material-symbols-outlined">home</span>
      Home
    </a>
  </div>

  <!-- Project Title and Description -->
  <div class="space-y-3">
    <h1 class="font-headline text-5xl font-extrabold text-on-surface">{{ project.name }}</h1>
    @if (project.description) {
      <p class="text-on-surface-variant font-body text-lg leading-relaxed max-w-3xl">{{ project.description }}</p>
    }
  </div>
</div>
